<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My One Page Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        nav {
            background-color: #333;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #f4b400;
        }

        section {
            padding: 60px 20px;
        }

        #home {
            background-color: #f4f4f4;
        }

        #gallery img {
            width: 300px;
            margin: 10px;
        }

        form {
            max-width: 400px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        iframe {
            max-width: 100%;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <h1>Welcome to My Website</h1>
        <p>This is a simple one-page website created using basic HTML elements. 
           Use the navigation menu above to jump to different sections of the page.</p>
    </section>

    <section id="gallery">
        <h2>Photo Gallery</h2>
        <img src="https://via.placeholder.com/300" alt="Placeholder Image 1">
        <img src="https://via.placeholder.com/300" alt="Placeholder Image 2">
        <img src="https://via.placeholder.com/300" alt="Placeholder Image 3">
    </section>

    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="YouTube video player" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <input type="submit" value="Submit">
        </form>
    </section>

    <footer>
        <p>&copy; 2026 My One Page Website | All Rights Reserved</p>
    </footer>

</body>
</html>
